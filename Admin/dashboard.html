<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="flex h-screen overflow-hidden">

        <aside class="w-64 bg-blue-950 text-[#dedede] flex flex-col h-screen sticky top-0">
            <div class="p-6 text-2xl font-bold border-b border-gray-700">Admin.</div>
            <nav class="flex-1 p-4 space-y-3 overflow-y-auto">
                <a href="./dashboard.html" class="flex items-center gap-3 py-2 px-3 bg-blue-900 rounded-lg">📊
                    Dashboard</a>
                <a href="./view_category.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">🈯 Category</a>
                <a href="./view_product.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">🛒 Products</a>
                <a href="./users.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">👥 Users</a>
                <a href="./create_product.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create
                    Product</a>
                <a href="./creat_users.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create User</a>
                <a href="./create_category.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create
                    Category</a>
            </nav>
            <div class="p-4 border-t border-gray-700 text-sm flex flex-col gap-2">
                <button id="logout_btn_sidebar"
                    class="w-full py-2 rounded bg-red-600 text-white hover:bg-red-700 cursor-pointer"><a href="./login.html">Logout</a></button>
                <p class="text-xs text-gray-400 text-center">&copy; 2026 Rework Admin</p>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-y-auto">

            <header class="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-10">
                <h1 class="text-xl font-semibold text-gray-800 tracking-tight">Overview</h1>
                <div class="relative">
                    <button class="flex items-center gap-2 cursor-pointer">
                        <span
                            class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-100 text-blue-800 font-bold"><a
                                href="./merchant.html">👤</a></span>
                        <h4 class="font-light text-sm">Admin<span class="text-gray-700 font-medium"
                                id="merchant_name"></span></h4>
                    </button>
                    <div id="dropdown"
                        class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-xl z-50">
                        <button id="logout_btn"
                            class="w-full px-4 py-3 text-left text-xs font-bold uppercase tracking-widest text-red-500 hover:bg-red-50 transition"><a href="./merchant.html">Logout</a></button>
                    </div>
                </div>
            </header>

            <main class="p-8 space-y-10">

                <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-50 flex flex-col justify-between">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Total
                            Products</span>
                        <p class="text-4xl font-light text-gray-800" id="total_products">0</p>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-50 flex flex-col justify-between">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Total
                            Users</span>
                        <p class="text-4xl font-light text-gray-800" id="total_users">0</p>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-50 flex flex-col justify-between">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4" id="total_cart">Cart
                            Items</span>
                        <p class="text-4xl font-light text-gray-800" id="bohemian_cart">0</p>
                    </div>
                </section>

                <section class="bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden">
                    <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-800 uppercase tracking-widest">Inventory Preview (Top 10)
                        </h2>
                        <a href="./view_product.html"
                            class="text-[10px] font-bold text-blue-600 uppercase tracking-widest hover:underline">View
                            All</a>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50/50">
                                <tr>
                                    <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                        Title</th>
                                    <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                        Image</th>
                                    <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                        Price</th>
                                    <th class="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                        Category</th>
                                </tr>
                            </thead>
                            <tbody id="table_data" class="divide-y divide-gray-50">
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>

</body>
<script src="./dash.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="flex h-screen overflow-hidden">

        <aside class="w-64 bg-blue-950 text-[#dedede] flex flex-col h-screen sticky top-0">
            <div class="p-6 text-2xl font-bold border-b border-gray-700">Admin.</div>
            <nav class="flex-1 p-4 space-y-3 overflow-y-auto">
                <a href="./dashboard.html" class="flex items-center gap-3 py-2 px-3 bg-blue-900 rounded-lg">📊
                    Dashboard</a>
                <a href="./view_category.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">🈯 Category</a>
                <a href="./view_product.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">🛒 Products</a>
                <a href="./users.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">👥 Users</a>
                <a href="./cart.html" class="flex items-center gap-3 py-2 px-3 bg-blue-900 rounded-lg">🛍️ My Cart</a>
                <a href="./create_product.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create
                    Product</a>
                <a href="./creat_users.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create User</a>
                <a href="./create_category.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create
                    Category</a>
            </nav>
            <div class="p-4 border-t border-gray-700 text-sm">
                <button onclick="localStorage.clear(); location.reload();"
                    class="w-full py-2 rounded bg-red-600 text-white hover:bg-red-700 transition cursor-pointer"><a href="./merchant.html">Logout</a></button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-y-auto">

            <header class="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-10">
                <h1 class="text-xl font-semibold text-gray-800 tracking-tight">Checkout Overview</h1>
                <div class="flex items-center gap-4">
                    <span
                        class="text-[10px] font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase tracking-widest"
                        id="item_count_badge">0 Items</span>
                </div>
            </header>

            <main class="p-8">
                <div class="max-w-5xl mx-auto">
                    <div class="mb-8">
                        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.3em] block mb-2">Order
                            Summary</span>
                        <h2 class="text-3xl font-light text-gray-800 tracking-tight">Your <span
                                class="font-semibold">Bohemian Selection</span></h2>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50/50">
                                <tr>
                                    <th class="px-6 py-5 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                        Product</th>
                                    <th
                                        class="px-6 py-5 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">
                                        Qty</th>
                                    <th
                                        class="px-6 py-5 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-right">
                                        Subtotal</th>
                                    <th
                                        class="px-6 py-5 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">
                                        Action</th>
                                </tr>
                            </thead>
                            <tbody id="cart_items_body" class="divide-y divide-gray-50">
                            </tbody>
                        </table>

                        <div class="p-8 bg-gray-50/30 flex justify-between items-center border-t border-gray-100">
                            <div>
                                <button onclick="clearCart()"
                                    class="text-[10px] font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest transition cursor-pointer">Clear
                                    Entire Cart</button>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Estimated
                                    Total</p>
                                <h3 class="text-3xl font-semibold text-gray-900" id="cart_total">₦0.00</h3>
                                <button
                                    class="mt-4 px-10 py-4 bg-black text-white text-[10px] font-bold uppercase tracking-[0.3em] rounded-xl hover:bg-gray-800 transition shadow-xl shadow-gray-200 cursor-pointer">
                                    Proceed to Payment
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="message"
                    class="mt-12 text-center text-[10px] uppercase tracking-widest text-gray-400 font-medium">
                </div>
            </main>
        </div>
    </div>

</body>
<script src="./cart.js"></script>

</html>

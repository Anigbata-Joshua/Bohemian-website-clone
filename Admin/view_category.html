<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Categories | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="flex h-screen overflow-hidden">

        <section class="w-64 bg-blue-950 text-[#dedede] flex flex-col h-screen sticky top-0">
            <div class="p-6 text-2xl font-bold border-b border-gray-700">
                Admin.
            </div>
            <nav class="flex-1 p-4 space-y-3 overflow-y-auto">
                <a href="./dashboard.html" class="flex items-center gap-3 py-2 px-3 bg-blue-900 rounded-lg">📊
                    Dashboard</a>
                <a href="./view_category.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">🈯 Category</a>
                <a href="./view_product.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">🛒 Products</a>
                <a href="./users.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">👥 Users</a>
                <a href="./create_product.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create
                    Product</a>
                <a href="./creat_users.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create User</a>
                <a href="./create_category.html"
                    class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-blue-900 transition">➕ Create
                    Category</a>
            </nav>
            <div class="p-4 border-t border-gray-700 text-sm flex flex-col gap-2">
                <button id="logout_btn_sidebar"
                    class="w-full py-2 rounded bg-red-600 text-white hover:bg-red-700 transition cursor-pointer">
                    Logout
                </button>
                <p class="text-xs text-gray-400 text-center">&copy; 2026 Rework Admin</p>
            </div>
        </section>

        <div class="flex-1 flex flex-col overflow-y-auto">

            <header class="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-10">
                <h1 class="text-xl font-semibold text-gray-800">Product Categories</h1>

                <div class="relative">
                    <button class="flex items-center gap-2 cursor-pointer">
                        <span
                            class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-100 text-blue-800 font-bold">👤</span>
                        <h4 class="font-light text-sm">Admin</h4>
                    </button>
                </div>
            </header>
            <main class="p-10 flex-1">
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white shadow-sm rounded-2xl overflow-hidden border border-gray-100">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gray-50/50 border-b border-gray-100">
                                    <th
                                        class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-[0.2em] text-center">
                                        Category Name
                                    </th>
                                    <th
                                        class="px-6 py-5 text-xs font-bold text-gray-400 uppercase tracking-[0.2em] text-center">
                                        Actions
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="table_category_container" class="divide-y divide-gray-50">
                            </tbody>
                        </table>
                    </div>

                    <div id="message"
                        class="mt-8 text-center text-[10px] font-semibold tracking-[0.15em] text-gray-400 uppercase">
                    </div>
                </div>
            </main>

        </div>
    </div>

    <script src="./view_created_product_category.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
</head>
<body>
     <!-- Overlay -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

  <!-- Modal -->
  <div class="bg-white w-[90%] max-w-5xl rounded-md shadow-lg relative p-6">

    <!-- Close Button -->
    <button class="absolute top-4 right-4 text-gray-500 hover:text-black text-xl">
      ✕
    </button>

    <!-- Header -->
    <h2 class="text-center text-sm tracking-wide text-gray-600 mb-6">
      OK, 1 ITEM WAS ADDED TO YOUR CART. WHAT'S NEXT?
    </h2>

    <!-- Content -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">

      <!-- Image -->
      <div>
        <img 
          src="/your-image.jpg" 
          alt="Product"
          class="w-full h-auto object-cover"
        />
      </div>

      <!-- Product Info -->
      <div class="space-y-2">
        <h3 class="text-lg font-semibold uppercase">
          Paisley Shirt Dress in Royal Blue
        </h3>
        <p class="text-xs text-gray-500 uppercase tracking-wide">
          Bohemian Traders
        </p>
        <p class="text-sm text-gray-600">
          1 × ₦357,643
        </p>
      </div>

      <!-- Actions -->
      <div class="space-y-4">
        
        <button class="w-full bg-black text-white py-3 text-sm uppercase tracking-wide hover:bg-gray-800">
          Proceed to Checkout
        </button>

        <div class="text-sm text-gray-600">
          <p>Order subtotal</p>
          <p class="text-lg font-semibold">₦318,700</p>
          <p class="text-xs mt-1">Your cart contains 1 item</p>
        </div>

        <button class="w-full border border-black py-3 text-sm uppercase hover:bg-black hover:text-white">
          Continue Shopping
        </button>

        <button class="w-full text-xs text-gray-500 underline">
          View or edit your cart
        </button>

      </div>

    </div>
  </div>
</div>
</body>
</html>
